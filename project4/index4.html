    <div class="main">
      <div id="wrapper">
        <h1>Number Guessing Game</h1>
        <p>Try and guess the number between 1 and 100</p>
        <p>You have 10 attempts to guess the number</p>
        <br />
        <form class="form">
          <label for="guessField" id="guess">Guess the number</label>
          <input type="text" id="guessField" class="guessField" />
          <input type="submit" value="Submit" id="guessSubmit" />
        </form>

        <div class="result">
          <p>Previous guesses: <span class="gusses"></span></p>
          <p>Guesses remaining: <span class="remaining">10</span></p>
          <p class="lowOrHi"></p>
        </div>
      </div>
    </div>
